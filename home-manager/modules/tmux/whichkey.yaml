command_alias_start_index: 200

keybindings:
  prefix_table: Space

title:
  style: "align=centre,bold"
  prefix: " tmux"
  prefix_style: "fg=green,bold"

items:
  # Windows
  - name: "new window"
    key: "c"
    command: "new-window"
  - name: "next window"
    key: "n"
    command: "next-window"
  - name: "rename window"
    key: ","
    command: "command-prompt -I '#W' { rename-window '%%' }"
  - name: "kill window"
    key: "&"
    command: "confirm-before -p 'kill-window #W? (y/n)' kill-window"
  - name: "move window ←"
    key: "<"
    command: "swap-window -d -t -1"
  - name: "move window →"
    key: ">"
    command: "swap-window -d -t +1"
  - name: "choose tree"
    key: "w"
    command: "choose-tree -Zs"
  - name: "find window"
    key: "f"
    command: "command-prompt { find-window -Z '%%' }"
  - separator: true
  # Panes: split
  - name: "split right"
    key: "|"
    command: "split-window -h -c '#{pane_current_path}'"
  - name: "split down"
    key: "-"
    command: "split-window -v -c '#{pane_current_path}'"
  - name: "split full right"
    key: "\\"
    command: "split-window -fh -c '#{pane_current_path}'"
  - name: "split full down"
    key: "_"
    command: "split-window -fv -c '#{pane_current_path}'"
  - name: "zoom pane"
    key: "z"
    command: "resize-pane -Z"
  - name: "kill pane"
    key: "x"
    command: "confirm-before -p 'kill-pane #P? (y/n)' kill-pane"
  - name: "break to window"
    key: "!"
    command: "break-pane"
  - name: "display panes"
    key: "q"
    command: "display-panes"
  - separator: true
  # Panes: navigate
  - name: "pane ←"
    key: "h"
    command: "select-pane -L"
  - name: "pane ↓"
    key: "j"
    command: "select-pane -D"
  - name: "pane ↑"
    key: "k"
    command: "select-pane -U"
  - name: "pane →"
    key: "l"
    command: "select-pane -R"
  - name: "last pane"
    key: ";"
    command: "last-pane"
  - name: "swap pane ↑"
    key: "{"
    command: "swap-pane -U"
  - name: "swap pane ↓"
    key: "}"
    command: "swap-pane -D"
  - separator: true
  # Panes: resize (pain-control; note: K is rebound to kill-session)
  - name: "resize ←"
    key: "H"
    command: "resize-pane -L 5"
  - name: "resize ↓"
    key: "J"
    command: "resize-pane -D 5"
  - name: "resize →"
    key: "L"
    command: "resize-pane -R 5"
  - separator: true
  # Sessions
  - name: "switch session"
    key: "s"
    command: "run-shell 'tmux display-popup -E -y0 tmux_select_session; exit 0'"
  - name: "kill session"
    key: "K"
    command: "run-shell 'tmux display-popup -E -y0 tmux_kill_session; exit 0'"
  - name: "detach"
    key: "d"
    command: "detach-client"
  - name: "rename session"
    key: "$"
    command: "command-prompt -I '#S' { rename-session '%%' }"
  - name: "prev session"
    key: "("
    command: "switch-client -p"
  - name: "next session"
    key: ")"
    command: "switch-client -n"
  - separator: true
  # Copy/Paste
  - name: "copy mode"
    key: "v"
    command: "copy-mode"
  - name: "paste buffer"
    key: "p"
    command: "paste-buffer"
  - name: "choose buffer"
    key: "="
    command: "choose-buffer -Z"
  - separator: true
  # Misc
  - name: "list keys"
    key: "?"
    command: "list-keys -N"
  - name: "clock"
    key: "t"
    command: "clock-mode"
