command_alias_start_index: 200

keybindings:
  prefix_table: Space

position:
  x: R
  y: P

custom_variables: []

macros: []

title:
  style: "align=centre,bold"
  prefix: " tmux"
  prefix_style: "fg=green,bold"

items:
  # Windows
  - name: "new window"
    key: "c"
    command: "new-window"
  - name: "next window"
    key: "n"
    command: "next-window"
  - name: "rename window"
    key: ","
    command: 'command-prompt -I "#W" { rename-window "%%" }'
  - name: "kill window"
    key: "&"
    command: 'confirm-before -p "kill-window #W? (y/n)" kill-window'
  - name: "move window ←"
    key: "<"
    command: "swap-window -d -t -1"
  - name: "move window →"
    key: ">"
    command: "swap-window -d -t +1"
  - name: "choose tree"
    key: "w"
    command: "choose-tree -Zs"
  - name: "find window"
    key: "f"
    command: 'command-prompt { find-window -Z "%%" }'
  - name: "next layout"
    key: "Space"
    command: 'run-shell "tmux_opensessions layout"'
  - name: "rotate panes"
    key: "r"
    command: 'run-shell "tmux_opensessions rotate"'
  - separator: true
  # Panes: split
  - name: "split right"
    key: "|"
    command: 'split-window -h -c "#{pane_current_path}"'
  - name: "split down"
    key: "-"
    command: 'split-window -v -c "#{pane_current_path}"'
  - name: "split full right"
    key: "\\\\"
    command: 'split-window -fh -c "#{pane_current_path}"'
  - name: "split full down"
    key: "_"
    command: 'split-window -fv -c "#{pane_current_path}"'
  - name: "zoom pane"
    key: "z"
    command: "resize-pane -Z"
  - name: "kill pane"
    key: "x"
    command: 'confirm-before -p "kill-pane #P? (y/n)" kill-pane'
  - name: "break to window"
    key: "!"
    command: "break-pane"
  - name: "display panes"
    key: "q"
    command: "display-panes"
  - separator: true
  # Panes: navigate
  - name: "pane ←"
    key: "h"
    command: "select-pane -L"
  - name: "pane ↓"
    key: "j"
    command: "select-pane -D"
  - name: "pane ↑"
    key: "k"
    command: "select-pane -U"
  - name: "pane →"
    key: "l"
    command: "select-pane -R"
  - name: "last pane"
    key: ";"
    command: "last-pane"
  - name: "swap pane ↑"
    key: "{"
    command: "swap-pane -U"
  - name: "swap pane ↓"
    key: "}"
    command: "swap-pane -D"
  - separator: true
  # Panes: resize (pain-control)
  - name: "resize ←"
    key: "H"
    command: "resize-pane -L 5"
  - name: "resize ↓"
    key: "J"
    command: "resize-pane -D 5"
  - name: "resize →"
    key: "L"
    command: "resize-pane -R 5"
  - separator: true
  # Sessions
  - name: "+sesh"
    key: "s"
    menu:
      - name: "switch session"
        key: "s"
        command: 'run-shell "sesh_tmux pick"'
      - name: "tmux sessions"
        key: "t"
        command: 'run-shell "sesh_tmux tmux"'
      - name: "zoxide dirs"
        key: "z"
        command: 'run-shell "sesh_tmux zoxide"'
      - name: "configs"
        key: "c"
        command: 'run-shell "sesh_tmux config"'
      - name: "find dirs"
        key: "f"
        command: 'run-shell "sesh_tmux find"'
      - name: "kill session"
        key: "k"
        command: 'run-shell "sesh_tmux kill"'
      - name: "last session"
        key: "l"
        command: 'run-shell "sesh_tmux last"'
      - name: "root session"
        key: "r"
        command: 'run-shell "sesh_tmux root"'
  - name: "detach"
    key: "d"
    command: "detach-client"
  - name: "rename session"
    key: "$"
    command: 'command-prompt -I "#S" { rename-session "%%" }'
  - name: "prev session"
    key: "("
    command: "switch-client -p"
  - name: "next session"
    key: ")"
    command: "switch-client -n"
  - name: "+opensessions"
    key: "o"
    menu:
      - name: "toggle sidebar"
        key: "o"
        command: 'run-shell "tmux_opensessions toggle"'
      - name: "focus sidebar"
        key: "f"
        command: 'run-shell "tmux_opensessions focus"'
      - name: "even-horizontal"
        key: "e"
        command: 'run-shell "tmux_opensessions even"'
      - name: "+jump to session"
        key: "j"
        menu:
          - name: "session 1"
            key: "1"
            command: 'run-shell "tmux_opensessions jump 1"'
          - name: "session 2"
            key: "2"
            command: 'run-shell "tmux_opensessions jump 2"'
          - name: "session 3"
            key: "3"
            command: 'run-shell "tmux_opensessions jump 3"'
          - name: "session 4"
            key: "4"
            command: 'run-shell "tmux_opensessions jump 4"'
          - name: "session 5"
            key: "5"
            command: 'run-shell "tmux_opensessions jump 5"'
          - name: "session 6"
            key: "6"
            command: 'run-shell "tmux_opensessions jump 6"'
          - name: "session 7"
            key: "7"
            command: 'run-shell "tmux_opensessions jump 7"'
          - name: "session 8"
            key: "8"
            command: 'run-shell "tmux_opensessions jump 8"'
          - name: "session 9"
            key: "9"
            command: 'run-shell "tmux_opensessions jump 9"'
  - separator: true
  # Copy/Paste
  - name: "copy mode"
    key: "v"
    command: "copy-mode"
  - name: "paste buffer"
    key: "p"
    command: "paste-buffer"
  - name: "choose buffer"
    key: "="
    command: "choose-buffer -Z"
  - separator: true
  # Misc
  - name: "list keys"
    key: "?"
    command: "list-keys -N"
  - name: "clock"
    key: "t"
    command: "clock-mode"
